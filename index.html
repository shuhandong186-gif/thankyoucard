<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>致婧文姐 · 电子明信片</title>
<link rel="preload" as="image" href="img/cover.webp">
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{
    height:100%;
    font-family:"PingFang SC","Microsoft YaHei","Hiragino Sans GB",sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  body{
    position:relative;
    min-height:100vh;
    background-color:#eef4f6;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }
  /* 底色层：蓝白渐变铺满视口（用纯色兜底，图片加载完再铺） */
  .bgfill{
    position:fixed; inset:0; z-index:0;
    background-image:url("img/base.webp");
    background-size:cover;
    background-position:center top;
    background-repeat:no-repeat;
    background-color:#dbeaf2;
  }
  /* 人物层：透明小丸子，固定右下角 */
  .figure{
    position:fixed; right:0; bottom:0; z-index:1;
    width:min(46vw, 420px);
    max-width:70vw;
    pointer-events:none; user-select:none; -webkit-user-drag:none;
  }
  @media (max-width:820px){
    .figure{ width:min(62vw, 340px); }
  }
  .wrap{ position:relative; z-index:2; display:flex; flex-direction:column; align-items:center; padding:14px; width:100%; }
  .scene{
    width:min(592px, 92vw, calc((100vh - 60px) * 1.4095));
    aspect-ratio:148 / 105;
    perspective:1800px;
  }
  .flip{
    position:relative; width:100%; height:100%;
    transform-style:preserve-3d;
    transition:transform .85s cubic-bezier(.4,.15,.2,1);
    cursor:pointer;
  }
  .flip.flipped{ transform:rotateY(180deg); }
  .face{
    position:absolute; inset:0;
    border-radius:12px; overflow:hidden;
    -webkit-backface-visibility:hidden; backface-visibility:hidden;
    box-shadow:0 22px 50px rgba(30,60,90,.28), 0 4px 12px rgba(30,60,90,.16);
    background:#8fd0e8;
  }
  .face .bg{
    position:absolute; inset:0; width:100%; height:100%;
    object-fit:cover; display:block; user-select:none; -webkit-user-drag:none;
  }
  .front{ transform:rotateY(0deg); }
  .back{ transform:rotateY(180deg); }
  .corner{
    position:absolute; right:12px; bottom:11px; z-index:5;
    font-size:11px; letter-spacing:.5px; color:#fff;
    background:rgba(28,78,99,.55); padding:4px 11px; border-radius:20px;
    backdrop-filter:blur(2px); display:flex; align-items:center; gap:5px;
    pointer-events:none; animation:pulse 2.2s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{opacity:.75;} 50%{opacity:1;} }
  @media print{
    @page{ size:148mm 105mm; margin:0; }
    html,body{ background:#fff; height:auto; display:block; overflow:visible; }
    .bgfill,.figure{ display:none; }
    .corner{ display:none; }
    .scene{ perspective:none; }
    .flip{ transform:none !important; }
    .face{
      position:relative; border-radius:0; box-shadow:none;
      backface-visibility:visible; transform:none !important;
      width:148mm; height:105mm; page-break-after:always;
    }
    .back{ display:block; }
  }
</style>
</head>
<body>
  <div class="bgfill"></div>
  <img class="figure" src="img/figure.webp" alt="" loading="lazy" decoding="async">
  <div class="wrap">
    <div class="scene">
      <div class="flip" id="flip">
        <div class="face front">
          <img class="bg" src="img/cover.webp" alt="封面" fetchpriority="high" decoding="async">
          <div class="corner">点击翻开 ✦</div>
        </div>
        <div class="face back">
          <img class="bg" src="img/inner.webp" alt="内页" loading="lazy" decoding="async">
          <div class="corner">点击翻回封面 ↺</div>
        </div>
      </div>
    </div>
  </div>
  <script>
    var flip=document.getElementById('flip');
    flip.addEventListener('click',function(){ flip.classList.toggle('flipped'); });
  </script>
</body>
</html>
